
<!DOCTYPE html>
<html lang='pt-br'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>StoreTauros</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#050816;
color:white;
padding:30px;
}
h1{
color:#3b82f6;
}
.card{
background:#0f172a;
border:1px solid #2563eb;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}
button{
background:#2563eb;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>STORETAUROS</h1>

<div class="card">
<h2>Membros Mistos</h2>
<p>R$ 2,00 por 100 membros</p>
<button>Comprar</button>
</div>

<div class="card">
<h2>Membros Reais</h2>
<p>R$ 2,50 por 100 membros</p>
<button>Comprar</button>
</div>

<div class="card">
<h2>Membros Premium</h2>
<p>R$ 6,50 por 100 membros</p>
<button>Comprar</button>
</div>

<div class="card">
<h2>Designer de Server</h2>
<p>R$ 35,00</p>
<button>Comprar</button>
</div>

<div class="card">
<h2>Conta Nitrada</h2>
<p>R$ 5,00</p>
<button>Comprar</button>
</div>

</body>
</html>
