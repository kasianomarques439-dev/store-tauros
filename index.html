
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Store Tauros</title>
<style>
body{
margin:0;
font-family:Arial;
background:url('assets/fundo-login.jpeg') center/cover fixed;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.70);
}
.login{
position:relative;
z-index:2;
width:420px;
background:rgba(10,10,20,.92);
border:2px solid #6f00ff;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px #6f00ff;
text-align:center;
color:white;
}
.login img{
width:180px;
border-radius:20px;
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #6f00ff;
background:#12051f;
color:white;
}
button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#5b00ff,#ae00ff);
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>
<div class="overlay"></div>

<div class="login">
<img src="assets/logo-tauros.png">

<h1>STORE TAUROS</h1>

<input placeholder="Email">
<input placeholder="Senha" type="password">

<button>LOGIN</button>
<button>CRIAR CONTA</button>

</div>

</body>
</html>
